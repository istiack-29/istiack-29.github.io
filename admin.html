<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN</title>
    
    <!-- Premium Font Matrix -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&family=Cinzel:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* ==========================================================================
           QUANTUM DESIGN SYSTEM v2.0 - ARCHITECTED BY GEMINI
           ========================================================================== 
        */
        :root {
            /* Core Neutrals */
            --bg-void: #020204;
            --bg-deep: #08080c;
            --bg-elevated: rgba(15, 15, 22, 0.85);
            --bg-glass: rgba(10, 10, 15, 0.7);
            
            /* Primary Brand - Liquid Gold & Plasma */
            --gold-primary: #D4AF37;
            --gold-bright: #F9D976;
            --gold-glow: rgba(212, 175, 55, 0.35);
            --gold-muted: rgba(212, 175, 55, 0.1);
            
            /* Status Indicators */
            --neon-green: #00ffaa;
            --neon-red: #ff2a6d;
            --neon-blue: #05d9e8;
            
            /* Text Hierarchy */
            --text-pure: #ffffff;
            --text-soft: #a0a0b0;
            --text-dark: #000000;
            
            /* Border Systems */
            --border-white: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(212, 175, 55, 0.4);
            
            /* Spacing & Radii */
            --radius-main: 16px;
            --radius-pill: 50px;
            --radius-card: 28px;
            
            /* Transitions */
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --transition-main: all 0.4s var(--ease-out-expo);
        }

        /* ==========================================================================
           GLOBAL RESET & LAYOUT 
           ========================================================================== 
        */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-void); 
            color: var(--text-pure); 
            font-family: 'Space Grotesk', 'Hind Siliguri', sans-serif;
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Core */
        .plasma-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(5, 217, 232, 0.03) 0%, transparent 40%);
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* ==========================================================================
           AUTHENTICATION PORTAL (MAX LEVEL)
           ========================================================================== 
        */
        #auth-overlay { 
            position: fixed; inset: 0; 
            background: #000; 
            z-index: 10000; 
            display: flex; justify-content: center; align-items: center; 
        }

        .auth-card { 
            background: var(--bg-elevated); 
            padding: 60px 40px; 
            border-radius: var(--radius-card); 
            border: 1px solid var(--border-white);
            width: 90%; max-width: 450px; 
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            animation: scanHorizontal 3s linear infinite;
        }

        .auth-card h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold-primary);
            font-size: 2rem;
            letter-spacing: 6px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px var(--gold-glow);
        }

        /* ==========================================================================
           NAVIGATION & HEADER 
           ========================================================================== 
        */
        .header { 
            padding: 20px 40px; 
            background: var(--bg-glass); 
            border-bottom: 1px solid var(--border-white); 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(25px);
        }
        
        .header h2 { 
            font-family: 'Cinzel', serif; 
            color: var(--gold-primary); 
            font-size: 1.4rem; 
            letter-spacing: 2px;
            display: flex; align-items: center; gap: 15px;
        }

        /* ==========================================================================
           CONTENT ARCHITECTURE 
           ========================================================================== 
        */
        .container { 
            max-width: 1500px; margin: 30px auto; padding: 0 25px; 
            display: grid; grid-template-columns: 1fr; gap: 30px; 
        }
        
        @media (min-width: 1024px) { 
            .container { grid-template-columns: 520px 1fr; align-items: start; } 
        }

        /* ==========================================================================
           COMPONENTS: CARDS, TABS, INPUTS 
           ========================================================================== 
        */
        .card { 
            background: var(--bg-elevated); 
            border-radius: var(--radius-card); 
            border: 1px solid var(--border-white); 
            padding: 30px; 
            margin-bottom: 25px; 
            transition: var(--transition-main);
            position: relative;
        }

        .card:hover { border-color: var(--border-gold); transform: translateY(-5px); }

        .card-title { 
            display: flex; align-items: center; gap: 12px; 
            color: var(--gold-primary); 
            font-size: 0.9rem; font-weight: 700; 
            margin-bottom: 25px; 
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* Inputs & Controls */
        input, textarea, select { 
            width: 100%; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border-white); 
            padding: 16px 20px; color: #fff; 
            border-radius: 14px; font-size: 1rem; 
            margin-top: 8px; transition: var(--transition-main);
            font-family: 'Space Grotesk', sans-serif;
        }

        input:focus { border-color: var(--gold-primary); outline: none; background: rgba(212, 175, 55, 0.05); }

        label { font-size: 0.8rem; color: var(--text-soft); margin-top: 15px; display: block; font-weight: 600; text-transform: uppercase; }

        /* Buttons */
        .btn-primary { 
            background: linear-gradient(135deg, var(--gold-primary), #B8860B); 
            color: #000; border: none; width: 100%; padding: 18px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; 
            margin-top: 25px; display: flex; align-items: center; 
            justify-content: center; gap: 10px; transition: var(--transition-main);
            font-size: 1rem; letter-spacing: 1px;
        }

        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px var(--gold-glow); }

        .btn-outline { 
            background: transparent; border: 1px solid var(--border-white); 
            color: #fff; padding: 12px 20px; border-radius: 12px; 
            cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: var(--transition-main);
            display: flex; align-items: center; gap: 8px;
        }

        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        /* ==========================================================================
           IDE & CODE PREVIEW SYSTEM
           ========================================================================== 
        */
        .preview-box { 
            background: #0b0b0e; border-radius: var(--radius-card); 
            border: 1px solid var(--border-white); 
            overflow: hidden; position: sticky; top: 100px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .terminal-header {
            background: #141418; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-white);
        }

        .window-controls { display: flex; gap: 8px; }
        .window-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        pre { 
            padding: 30px; color: var(--neon-green); 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.85rem; overflow-x: auto; 
            max-height: 700px; line-height: 1.7; 
            background: linear-gradient(rgba(0,0,0,0) 0%, rgba(0,0,0,0.2) 100%);
        }

        /* ==========================================================================
           DATA LIST MANAGEMENT
           ========================================================================== 
        */
        .item-row { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-white); 
            padding: 20px; border-radius: 18px; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 15px; 
            transition: var(--transition-main);
        }

        .item-row:hover { background: rgba(255,255,255,0.05); border-color: var(--gold-primary); }

        .item-info b { display: block; color: var(--gold-primary); font-size: 1.05rem; margin-bottom: 5px; }
        .item-info span { font-size: 0.85rem; color: var(--text-soft); }

        /* ==========================================================================
           ANIMATIONS & OVERLAYS 
           ========================================================================== 
        */
        @keyframes scanHorizontal {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .spinner { animation: rotate 2s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-void); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; border: 3px solid var(--bg-void); }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-primary); }

        #custom-popup { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 20000; display: none; justify-content: center; align-items: center; padding: 20px; 
        }

        .popup-content { 
            background: var(--bg-elevated); border: 2px solid var(--gold-primary); 
            padding: 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 500px;
            box-shadow: 0 0 50px var(--gold-glow);
        }
    </style>
</head>
<body>

<div class="plasma-bg"></div>
<div class="grid-overlay"></div>

<!-- AUTHENTICATION -->
<div id="auth-overlay">
    <div class="auth-card">
        <h1>ACCESS VAULT</h1>
        <div style="position: relative;">
            <i data-lucide="shield-lock" style="position: absolute; left: 15px; top: 25px; width: 20px; color: var(--gold-primary);"></i>
            <input type="password" id="admin-pass" placeholder="Enter Command Key" style="text-align:center; padding-left: 45px; letter-spacing: 5px;">
        </div>
        <button class="btn-primary" onclick="checkAuth()">
            <i data-lucide="fingerprint"></i> INITIALIZE SESSION
        </button>
    </div>
</div>

<!-- TOKEN REVEAL POPUP -->
<div id="custom-popup">
    <div class="popup-content">
        <i data-lucide="key" style="color:var(--gold-primary); width:60px; height:60px; margin-bottom:20px;"></i>
        <h3 style="color:var(--gold-primary); font-size: 1.5rem; margin-bottom: 10px;">Security Token Decrypted</h3>
        <p style="color: var(--text-soft); font-size: 0.9rem; margin-bottom: 20px;">Use this token for manual Git authentication if needed.</p>
        <div class="token-display" id="revealed-token-val" style="background:#000; padding:20px; border-radius:15px; border:1px dashed var(--gold-primary); font-family:monospace; color:var(--neon-blue); word-break:break-all; margin-bottom:25px;"></div>
        <button class="btn-primary" onclick="copyToken()">
            <i data-lucide="copy"></i> COPY TOKEN
        </button>
        <button class="btn-outline" style="width:100%; margin-top:15px; justify-content:center;" onclick="closePopup()">DISMISS</button>
    </div>
</div>

<!-- MAIN APPLICATION -->
<div id="main-panel" style="display:none;">
    <header class="header">
        <div style="display:flex; align-items:center; gap:25px;">
            <h2>ISTIACK PORTAL</h2>
            <button class="btn-outline" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="pushToGitHub()" id="sync-btn">
                <i data-lucide="zap"></i> PUSH TO PRODUCTION
            </button>
        </div>
        <button class="btn-outline" style="border:none; color: var(--neon-red);" onclick="location.reload()">
            <i data-lucide="power"></i>
        </button>
    </header>

    <div class="container">
        <!-- CONTROLS SIDEBAR -->
        <div class="sidebar">
            
            <!-- SECURITY WIDGET -->
            <div class="card" style="border-color: var(--gold-primary);">
                <div class="card-title"><i data-lucide="github"></i> Git Auth Controller</div>
                <label>GitHub Access Token (Scoped)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="rawTokenInput" placeholder="ghp_xxxxxxxxxxxxxxx" style="font-family: monospace;">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <button class="btn-primary" onclick="updateTokenSplitted()">
                        <i data-lucide="save"></i> SYNC KEY
                    </button>
                    <button class="btn-outline" onclick="handleReveal()" style="margin-top:25px; border-color:var(--gold-primary); color:var(--gold-primary);">
                        <i data-lucide="eye"></i> INSPECT
                    </button>
                </div>
            </div>

            <!-- BIO METRICS -->
            <div class="card" style="border-left: 5px solid var(--neon-red);">
                <div class="card-title"><i data-lucide="activity" style="color:var(--neon-red);"></i> Life Status (Vitals)</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div>
                        <label>Hemoglobin</label>
                        <input type="number" id="hl_input" step="0.1">
                    </div>
                    <div>
                        <label>Donation Cycle</label>
                        <input type="text" id="ld_input">
                    </div>
                </div>
                <button class="btn-primary" onclick="updateHealthData()" style="background: var(--neon-red); color:#fff; border:none;">
                    <i data-lucide="heart-pulse"></i> UPDATE BIOMETRICS
                </button>
            </div>

            <!-- TABS -->
            <div style="display:flex; gap:10px; margin-bottom:25px;">
                <button id="tab-add" class="btn-outline active" style="flex:1; justify-content:center;" onclick="switchTab('add')">CONSTRUCT</button>
                <button id="tab-manage" class="btn-outline" style="flex:1; justify-content:center;" onclick="switchTab('manage')">REPOSITORY</button>
            </div>

            <!-- EDITOR -->
            <div id="section-add">
                <div class="card">
                    <div class="card-title"><i data-lucide="cpu"></i> Entry Matrix</div>
                    <select id="mainCat" onchange="renderFields()">
                        <option value="projects">Projects (প্রকল্প)</option>
                        <option value="thoughts">Thoughts (চিন্তাভাবনা)</option>
                        <option value="debate_exp">Debate Experience (বিতর্ক অভিজ্ঞতা)</option>
                        <option value="debate_ach">Debate Achievement (বিতর্ক অর্জন)</option>
                        <option value="pol_pos">Political Position (রাজনৈতিক পদবি)</option>
                        <option value="pol_works">Political Activity (রাজনৈতিক কাজ)</option>
                    </select>
                    
                    <div id="fields-container" style="margin-top:20px;"></div>
                    
                    <button class="btn-primary" id="save-btn" onclick="saveData()">COMMIT CHANGES</button>
                    <button class="btn-outline" id="cancel-edit" style="width:100%; margin-top:15px; justify-content:center; display:none;" onclick="cancelEdit()">ABORT EDIT</button>
                </div>
            </div>

            <!-- LIST -->
            <div id="section-manage" style="display:none;">
                <div class="card">
                    <div class="card-title"><i data-lucide="database"></i> Cluster Management</div>
                    <select id="manageCat" onchange="loadList()"></select>
                    <div id="item-list" style="margin-top:25px;"></div>
                </div>
            </div>
        </div>

        <!-- CODE VIEW -->
        <div class="preview-box">
            <div class="terminal-header">
                <div class="window-controls">
                    <div class="window-dot dot-red"></div>
                    <div class="window-dot dot-yellow"></div>
                    <div class="window-dot dot-green"></div>
                </div>
                <div style="font-size: 0.75rem; color: #666; font-weight: 700; letter-spacing: 1px;">DATABASE.JS (READ-ONLY)</div>
                <button class="btn-outline" style="padding: 5px 12px; font-size: 0.7rem;" onclick="copyAllCode()">
                    <i data-lucide="copy" style="width:12px;"></i> COPY SOURCE
                </button>
            </div>
            <pre id="code-output"></pre>
        </div>
    </div>
</div>

<script src="Data.js"></script>
<script>
    /* ==========================================================================
       CORE LOGIC (AS CHALLENGED: NO TOUCHING)
       ========================================================================== 
    */
    const G_CONFIG = { owner: "istiack-29", repo: "istiack-29.github.io", path: "Data.js" };
    let editIdx = -1;

    function checkAuth() {
        if(document.getElementById('admin-pass').value === ".") {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            lucide.createIcons();
            initAdmin();
        }
    }

    function initAdmin() {
        document.getElementById('manageCat').innerHTML = document.getElementById('mainCat').innerHTML;
        if(portfolioData.hl) document.getElementById('hl_input').value = portfolioData.hl;
        if(portfolioData.ld) document.getElementById('ld_input').value = portfolioData.ld;
        renderFields();
        updatePreview();
    }

    function updateHealthData() {
        portfolioData.hl = parseFloat(document.getElementById('hl_input').value) || 0;
        portfolioData.ld = document.getElementById('ld_input').value.trim() || "";
        updatePreview();
        showToast("Vitals Synced to Preview");
    }

    function updateTokenSplitted() {
        const val = document.getElementById('rawTokenInput').value.trim();
        if(!val.startsWith('ghp_')) return alert("Invalid Protocol - Token must start with ghp_");
        portfolioData.lut1 = val.substring(0, 10);
        portfolioData.lut2 = val.substring(10, 25);
        portfolioData.lut3 = val.substring(25);
        updatePreview();
        alert("Authorization Key Locked");
        document.getElementById('rawTokenInput').value = "";
    }

    function handleReveal() {
        if(prompt("Level 2 Security Clearance Required:") === ".") {
            const full = (portfolioData.lut1||"") + (portfolioData.lut2||"") + (portfolioData.lut3||"");
            document.getElementById('revealed-token-val').innerText = full || "Null Reference";
            document.getElementById('custom-popup').style.display = 'flex';
        }
    }

    function closePopup() { document.getElementById('custom-popup').style.display = 'none'; }
    function copyToken() { 
        const t = document.getElementById('revealed-token-val').innerText;
        copyToClipboard(t, "Token Extracted");
    }

    function switchTab(t) {
        document.getElementById('section-add').style.display = t==='add'?'block':'none';
        document.getElementById('section-manage').style.display = t==='manage'?'block':'none';
        
        document.getElementById('tab-add').style.borderColor = t==='add' ? 'var(--gold-primary)' : 'var(--border-white)';
        document.getElementById('tab-manage').style.borderColor = t==='manage' ? 'var(--gold-primary)' : 'var(--border-white)';
        
        if(t==='manage') loadList();
    }

    function renderFields(existing = null) {
        const cat = document.getElementById('mainCat').value;
        const container = document.getElementById('fields-container');
        document.getElementById('save-btn').innerText = editIdx===-1 ? "COMMIT CHANGES" : "PATCH RECORD";
        document.getElementById('cancel-edit').style.display = editIdx===-1 ? "none" : "flex";
        
        let h = '';
        if(cat === 'projects') {
            h = `<label>Work Title (কাজের নাম)</label><input id="i_title" value="${existing?.work||''}">
                 <label>Description (বিস্তারিত)</label><textarea id="i_desc" rows="4">${existing?.desc||''}</textarea>
                 <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Start Date</label><input id="i_st" type="date" value="${existing?.st||''}"></div>
                    <div><label>End Date</label><input id="i_en" type="date" value="${existing?.en||''}"></div>
                 </div>
                 <label>Image URL</label><input id="i_img" value="${existing?.pc?.[0]||''}">`;
        } else if(cat === 'thoughts') {
            h = `<label>Your Thought (চিন্তাভাবনা)</label><textarea id="i_text" rows="5">${existing?.text||''}</textarea>
                 <label>Date (Ex: ১২ মে ২০২৪)</label><input id="i_date" value="${existing?.date||''}">
                 <label>Author Image URL</label><input id="i_ph" value="${existing?.ph||'profile.png'}">`;
        } else if(cat === 'debate_exp' || cat === 'pol_pos') {
            const timeParts = (existing?.time || "").split(' - ');
            h = `<label>Position Name (পদবি)</label><input id="i_pos" value="${existing?.post||''}">
                 <label>Organization (সংগঠন/ক্লাব)</label><input id="i_org" value="${existing?.org||existing?.cl||''}">
                 <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Start Year</label><input id="i_st" value="${timeParts[0]||''}"></div>
                    <div><label>End (Year or 'Present')</label><input id="i_en" value="${timeParts[1]||''}"></div>
                 </div>`;
        } else if(cat === 'debate_ach') {
            h = `<label>Achievement (অর্জন)</label><input id="i_ach" value="${existing?.ach||''}">
                 <label>Tournament (টুর্নামেন্ট)</label><input id="i_tn" value="${existing?.tn||''}">
                 <label>Year / Time</label><input id="i_time" value="${existing?.time||''}">`;
        } else if(cat === 'pol_works') {
            h = `<label>Activity Title</label><input id="i_title" value="${existing?.title||''}">
                 <label>Description</label><textarea id="i_desc" rows="4">${existing?.des||''}</textarea>
                 <label>Activity Image URL</label><input id="i_img" value="${existing?.img||''}">`;
        }
        container.innerHTML = h;
    }

    function saveData() {
        const cat = document.getElementById('mainCat').value;
        let obj = {};

        if(cat==='projects') obj = { work: document.getElementById('i_title').value, desc: document.getElementById('i_desc').value, st: document.getElementById('i_st').value, en: document.getElementById('i_en').value, pc: [document.getElementById('i_img').value] };
        else if(cat==='thoughts') obj = { id: editIdx===-1 ? Date.now() : portfolioData.thoughts[editIdx].id, text: document.getElementById('i_text').value, date: document.getElementById('i_date').value, ph: document.getElementById('i_ph').value || "profile.png" };
        else if(cat==='debate_exp') obj = { post: document.getElementById('i_pos').value, cl: document.getElementById('i_org').value, time: document.getElementById('i_st').value + (document.getElementById('i_en').value ? " - " + document.getElementById('i_en').value : "") };
        else if(cat==='debate_ach') obj = { ach: document.getElementById('i_ach').value, tn: document.getElementById('i_tn').value, time: document.getElementById('i_time').value };
        else if(cat==='pol_pos') obj = { post: document.getElementById('i_pos').value, org: document.getElementById('i_org').value, time: document.getElementById('i_st').value + (document.getElementById('i_en').value ? " - " + document.getElementById('i_en').value : "") };
        else if(cat==='pol_works') obj = { id: editIdx===-1 ? Date.now() : portfolioData.politics.activities[editIdx].id, title: document.getElementById('i_title').value, des: document.getElementById('i_desc').value, img: document.getElementById('i_img').value };

        const targetArr = (cat==='projects')?portfolioData.projects:(cat==='thoughts')?portfolioData.thoughts:(cat==='debate_exp')?portfolioData.debate.experience:(cat==='debate_ach')?portfolioData.debate.achievements:(cat==='pol_pos')?portfolioData.politics.positions:portfolioData.politics.activities;

        if(editIdx === -1) targetArr.unshift(obj); else targetArr[editIdx] = obj;
        cancelEdit(); updatePreview(); switchTab('manage');
        showToast("Memory Array Updated");
    }

    function loadList() {
        const cat = document.getElementById('manageCat').value;
        const cont = document.getElementById('item-list');
        let arr = (cat==='projects')?portfolioData.projects:(cat==='thoughts')?portfolioData.thoughts:(cat==='debate_exp')?portfolioData.debate.experience:(cat==='debate_ach')?portfolioData.debate.achievements:(cat==='pol_pos')?portfolioData.politics.positions:portfolioData.politics.activities;

        cont.innerHTML = arr.map((item, i) => `
            <div class="item-row">
                <div class="item-info">
                    <b>${(item.work || item.text || item.post || item.ach || item.title || 'Data Object').substring(0, 35)}...</b>
                    <span>${item.org || item.cl || item.tn || item.time || item.date || 'Metadata Empty'}</span>
                </div>
                <div style="display:flex; gap:12px;">
                    <button class="btn-outline" style="padding: 8px;" onclick="editItem('${cat}', ${i})"><i data-lucide="edit-2" style="width:16px;"></i></button>
                    <button class="btn-outline" style="padding: 8px; color:var(--neon-red); border-color:rgba(255,42,109,0.3);" onclick="deleteItem('${cat}', ${i})"><i data-lucide="trash" style="width:16px;"></i></button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function editItem(cat, i) {
        editIdx = i;
        document.getElementById('mainCat').value = cat;
        const arr = (cat==='projects')?portfolioData.projects:(cat==='thoughts')?portfolioData.thoughts:(cat==='debate_exp')?portfolioData.debate.experience:(cat==='debate_ach')?portfolioData.debate.achievements:(cat==='pol_pos')?portfolioData.politics.positions:portfolioData.politics.activities;
        switchTab('add');
        renderFields(arr[i]);
    }

    function cancelEdit() { editIdx = -1; renderFields(); }

    function deleteItem(cat, i) {
        if(!confirm("Purge this record from core memory?")) return;
        const arr = (cat==='projects')?portfolioData.projects:(cat==='thoughts')?portfolioData.thoughts:(cat==='debate_exp')?portfolioData.debate.experience:(cat==='debate_ach')?portfolioData.debate.achievements:(cat==='pol_pos')?portfolioData.politics.positions:portfolioData.politics.activities;
        arr.splice(i, 1);
        loadList(); updatePreview();
        showToast("Record Purged");
    }

    function updatePreview() {
        document.getElementById('code-output').innerText = `const portfolioData = ${JSON.stringify(portfolioData, null, 4)};`;
    }

    async function pushToGitHub() {
        const token = (portfolioData.lut1||"") + (portfolioData.lut2||"") + (portfolioData.lut3||"");
        if(!token) return alert("Fatal Error: No Access Token Detected.");
        
        const btn = document.getElementById('sync-btn');
        const originalHtml = btn.innerHTML;
        btn.disabled = true; 
        btn.innerHTML = '<i data-lucide="refresh-cw" class="spinner"></i> CONNECTING...'; 
        lucide.createIcons();

        try {
            const url = `https://api.github.com/repos/${G_CONFIG.owner}/${G_CONFIG.repo}/contents/${G_CONFIG.path}`;
            const res = await fetch(url);
            if(!res.ok) throw new Error("Connection Refused");
            
            const d = await res.json();
            const content = document.getElementById('code-output').innerText;
            
            const put = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: "Quantum Production Sync: " + new Date().toISOString(), 
                    content: btoa(unescape(encodeURIComponent(content))), 
                    sha: d.sha 
                })
            });

            if(put.ok) {
                showToast("DEPLOYMENT SUCCESSFUL");
            } else {
                alert("Protocol Error: " + put.status);
            }
        } catch(e) { 
            alert("Uplink Failure: Verify your token permissions."); 
        } finally {
            btn.disabled = false; 
            btn.innerHTML = originalHtml; 
            lucide.createIcons();
        }
    }

    /* Helper: Copy Functions */
    function copyAllCode() {
        const code = document.getElementById('code-output').innerText;
        copyToClipboard(code, "Source Copied to Buffer");
    }

    function copyToClipboard(text, msg) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast(msg);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.cssText = `
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--gold-primary); color: #000; padding: 12px 24px;
            border-radius: 50px; font-weight: 700; z-index: 99999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 0.8rem;
            animation: toastIn 0.5s var(--ease-out-expo) forwards;
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = "toastOut 0.5s forwards";
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    // New Animations
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes toastIn { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes toastOut { to { bottom: -50px; opacity: 0; } }
    `;
    document.head.appendChild(style);
</script>
</body>
