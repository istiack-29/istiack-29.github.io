<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডেটা কন্ট্রোল প্যানেল | ইস্তিয়াক</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #D4AF37;
            --danger: #ff4d4d;
            --text: #ffffff;
            --muted: #888888;
            --input-bg: #000000;
            --border: #222222;
            --code-bg: #080808;
        }

        /* মূল বডির জন্য হিন্দ শিলিগুড়ি ফন্ট */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Hind Siliguri', sans-serif; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 10px; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Authentication Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .auth-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
        }

        .auth-card h1 { color: var(--accent); margin-bottom: 25px; font-size: 1.5rem; }
        .auth-input { margin-bottom: 15px; }
        .auth-input input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; font-size: 1rem; text-align: center; }
        .auth-input input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: #000; font-size: 1rem; }
        .auth-error { color: var(--danger); font-size: 0.85rem; margin-top: 10px; display: none; }

        /* Dashboard Styles */
        .wrapper { max-width: 1250px; margin: 0 auto; display: none; gap: 15px; }
        .panel-grid { display: grid; gap: 15px; }

        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .card h2 { color: var(--accent); font-size: 1.25rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; font-weight: 700; }

        .tab-buttons { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 14px; background: #1a1a1a; border: 1px solid var(--border); color: var(--text); border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--accent); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        
        input, textarea, select { 
            width: 100%; background: var(--input-bg); border: 1px solid var(--border); 
            padding: 14px; color: #fff; border-radius: 12px; font-size: 1rem; font-family: 'Hind Siliguri', sans-serif;
            transition: 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1); }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-action { 
            background: var(--accent); color: #000; border: none; width: 100%; 
            padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; 
            margin-top: 10px; font-size: 1.05rem; transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.97); }

        .item-list { display: flex; flex-direction: column; gap: 12px; max-height: 480px; overflow-y: auto; padding-right: 8px; }
        .list-item { background: #080808; border: 1px solid var(--border); padding: 14px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .list-item .info { display: flex; flex-direction: column; overflow: hidden; }
        .list-item .info .title { font-size: 1rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item .info .sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
        
        .del-btn { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: 0.2s; }
        .del-btn:hover { background: var(--danger); color: #fff; }

        .code-box { background: var(--code-bg); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; height: fit-content; }
        .code-header { background: #111; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .copy-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
        
        pre { 
            padding: 18px; color: #76e056; 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important; 
            font-size: 0.85rem; line-height: 1.5; overflow-x: auto; 
            max-height: 600px; white-space: pre-wrap; word-break: break-all;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @media (min-width: 900px) {
            .wrapper { grid-template-columns: 480px 1fr; align-items: start; padding: 30px; }
            pre { max-height: 85vh; }
        }
    </style>
</head>
<body>

<!-- Authentication Screen -->
<div id="auth-overlay">
    <div class="auth-card">
        <h1>প্রশাসক লগইন</h1>
        <div class="auth-input">
            <input type="text" id="username" placeholder="ইউজারনেম">
        </div>
        <div class="auth-input">
            <input type="password" id="password" placeholder="পাসওয়ার্ড">
        </div>
        <button class="auth-btn" onclick="checkAuth()">প্রবেশ করুন</button>
        <div id="auth-error" class="auth-error">ভুল ইউজারনেম বা পাসওয়ার্ড!</div>
    </div>
</div>

<!-- Main Admin Panel -->
<div class="wrapper" id="main-content">
    <div class="panel-grid">
        <div class="tab-buttons">
            <button id="tabAdd" class="tab-btn active" onclick="switchTab('add')">সংযোজন কেন্দ্র</button>
            <button id="tabRemove" class="tab-btn" onclick="switchTab('remove')">বিয়োজন কেন্দ্র</button>
        </div>

        <!-- সংযোজন -->
        <div id="addPanel" class="card">
            <h2><i data-lucide="list-plus"></i> নতুন সংযোজন</h2>
            <div class="form-group">
                <label>বিভাগ নির্বাচন</label>
                <select id="mainCat" onchange="renderAddForm()">
                    <option value="projects">প্রোজেক্ট (Projects)</option>
                    <option value="debate_exp">বিতর্ক অভিজ্ঞতা (Experience)</option>
                    <option value="debate_ach">বিতর্ক অর্জন (Achievement)</option>
                    <option value="politics_pos">রাজনৈতিক পদবী (Positions)</option>
                    <option value="politics_act">রাজনৈতিক কার্যক্রম (Activities)</option>
                    <option value="thoughts">চিন্তাধারা (Thoughts)</option>
                </select>
            </div>
            <div id="addFields"></div>
            <button class="btn-action" onclick="addNewData()">ডাটাতে যোগ করুন</button>
        </div>

        <!-- বিয়োজন -->
        <div id="removePanel" class="card" style="display:none;">
            <h2><i data-lucide="list-minus"></i> তথ্য বিয়োজন</h2>
            <div class="form-group">
                <label>বিভাগ নির্বাচন</label>
                <select id="delCat" onchange="renderDeleteList()">
                    <option value="projects">প্রোজেক্ট (Projects)</option>
                    <option value="debate_exp">বিতর্ক অভিজ্ঞতা</option>
                    <option value="debate_ach">বিতর্ক অর্জন</option>
                    <option value="politics_pos">রাজনৈতিক পদবী</option>
                    <option value="politics_act">রাজনৈতিক কার্যক্রম</option>
                    <option value="thoughts">চিন্তাধারা</option>
                </select>
            </div>
            <div id="deleteList" class="item-list"></div>
        </div>
    </div>

    <!-- কোড আউটপুট -->
    <div class="code-box">
        <div class="code-header">
            <span style="color: var(--muted); font-size: 0.85rem; font-weight: 500;">Data.js প্রিভিউ:</span>
            <button class="copy-btn" onclick="copyData()">Copy All Content</button>
        </div>
        <pre id="codeOutput"></pre>
    </div>
</div>

<script src="Data.js"></script>

<script>
    // Authentication Logic
    // এখানে আপনার পছন্দের ইউজারনেম ও পাসওয়ার্ড দিন
    const ADMIN_USER = "Istiack";
    const ADMIN_PASS = "it29it29";

    function checkAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('auth-error');

        if(u === ADMIN_USER && p === ADMIN_PASS) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'grid';
            lucide.createIcons();
            renderAddForm();
            updateCodeDisplay();
        } else {
            err.style.display = 'block';
            setTimeout(() => { err.style.display = 'none'; }, 2000);
        }
    }

    // Dashboard Logic
    const currentYear = new Date().getFullYear();
    const years = Array.from({length: currentYear - 2006}, (_, i) => 2007 + i);
    const months = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];

    function switchTab(mode) {
        document.getElementById('addPanel').style.display = mode === 'add' ? 'block' : 'none';
        document.getElementById('removePanel').style.display = mode === 'remove' ? 'block' : 'none';
        document.getElementById('tabAdd').classList.toggle('active', mode === 'add');
        document.getElementById('tabRemove').classList.toggle('active', mode === 'remove');
        if(mode === 'remove') renderDeleteList();
    }

    function renderAddForm() {
        const cat = document.getElementById('mainCat').value;
        const container = document.getElementById('addFields');
        let html = '';

        if(cat === 'projects') {
            html = `
                <div class="form-group"><label>কাজের নাম (work)</label><input id="p_work" type="text" placeholder="উদা: মেহেরপুর ডিবেট ফেস্টিভ্যাল"></div>
                <div class="form-group"><label>বর্ণনা (desc)</label><textarea id="p_desc" rows="3" placeholder="বিস্তারিত তথ্য..."></textarea></div>
                <div class="row"><div class="form-group"><label>শুরু (st)</label><input id="p_st" type="date"></div><div class="form-group"><label>শেষ (en)</label><input id="p_en" type="date"></div></div>
                <div class="form-group"><label>ছবির লিঙ্ক (pc - ঐচ্ছিক)</label><input id="p_pc" type="text" placeholder="কমা দিয়ে আলাদা করুন"></div>`;
        } else if(cat === 'debate_exp') {
            html = `<div class="form-group"><label>পদবী (post)</label><input id="d_post" type="text" placeholder="পদবী"></div><div class="form-group"><label>প্রতিষ্ঠান (cl)</label><input id="d_cl" type="text" placeholder="ক্লাব"></div><div class="form-group"><label>সময়কাল (time)</label><input id="d_time" type="text" placeholder="২০২৪ - বর্তমান"></div>`;
        } else if(cat === 'debate_ach') {
            html = `<div class="form-group"><label>অর্জন (ach)</label><input id="d_ach" type="text" placeholder="অর্জন"></div><div class="form-group"><label>টুর্নামেন্ট (tn)</label><input id="d_tn" type="text" placeholder="টুর্নামেন্ট"></div><div class="row"><div class="form-group"><label>মাস</label><select id="d_month">${months.map(m=>`<option>${m}</option>`).join('')}</select></div><div class="form-group"><label>বছর</label><select id="d_year">${years.map(y=>`<option ${y==currentYear?'selected':''}>${y}</option>`).join('')}</select></div></div>`;
        } else if(cat === 'politics_pos') {
            html = `<div class="form-group"><label>পদবী (post)</label><input id="pol_post" type="text" placeholder="পদ"></div><div class="form-group"><label>সংগঠন (org)</label><input id="pol_org" type="text" placeholder="সংগঠন"></div><div class="form-group"><label>সময়কাল (time)</label><input id="pol_time" type="text" placeholder="সময়"></div>`;
        } else if(cat === 'politics_act') {
            html = `<div class="form-group"><label>টাইটেল</label><input id="pol_title" type="text" placeholder="টাইটেল"></div><div class="form-group"><label>বিস্তারিত (des)</label><textarea id="pol_des" rows="3" placeholder="বিস্তারিত..."></textarea></div><div class="form-group"><label>ছবির লিঙ্ক (ph)</label><input id="pol_ph" type="text" placeholder="ইমেজ লিঙ্ক"></div>`;
        } else if(cat === 'thoughts') {
            html = `<div class="form-group"><label>চিন্তাধারা (text)</label><textarea id="t_text" rows="5" placeholder="ভাবনা..."></textarea></div><div class="form-group"><label>ফটো (ph)</label><input id="t_ph" type="text" value="profile.png"></div><div class="form-group"><label>তারিখ (date)</label><input id="t_date" type="text" value="${new Date().toLocaleDateString('bn-BD')}"></div>`;
        }
        container.innerHTML = html;
    }

    function addNewData() {
        const cat = document.getElementById('mainCat').value;
        try {
            if(cat === 'projects') {
                portfolioData.projects.push({ 
                    work: document.getElementById('p_work').value, 
                    desc: document.getElementById('p_desc').value, 
                    st: document.getElementById('p_st').value, 
                    en: document.getElementById('p_en').value, 
                    pc: document.getElementById('p_pc').value ? document.getElementById('p_pc').value.split(',').map(s=>s.trim()) : [] 
                });
            } else if(cat === 'debate_exp') {
                portfolioData.debate.experience.push({ post: document.getElementById('d_post').value, cl: document.getElementById('d_cl').value, time: document.getElementById('d_time').value });
            } else if(cat === 'debate_ach') {
                portfolioData.debate.achievements.push({ ach: document.getElementById('d_ach').value, tn: document.getElementById('d_tn').value, time: document.getElementById('d_month').value + " " + document.getElementById('d_year').value });
            } else if(cat === 'politics_pos') {
                portfolioData.politics.positions.push({ post: document.getElementById('pol_post').value, org: document.getElementById('pol_org').value, time: document.getElementById('pol_time').value });
            } else if(cat === 'politics_act') {
                portfolioData.politics.activities.push({ id: Date.now(), ph: document.getElementById('pol_ph').value, title: document.getElementById('pol_title').value, des: document.getElementById('pol_des').value });
            } else if(cat === 'thoughts') {
                portfolioData.thoughts.push({ id: Date.now(), text: document.getElementById('t_text').value, ph: document.getElementById('t_ph').value, date: document.getElementById('t_date').value });
            }
            updateCodeDisplay();
            alert("সফলভাবে ডাটা যোগ হয়েছে!");
        } catch(e) { alert("একটি সমস্যা হয়েছে!"); }
    }

    function renderDeleteList() {
        const cat = document.getElementById('delCat').value;
        const container = document.getElementById('deleteList');
        let dataArray = [];
        let labelKey = '', subKey = '';

        if(cat === 'projects') { dataArray = portfolioData.projects; labelKey = 'work'; subKey = 'st'; }
        else if(cat === 'debate_exp') { dataArray = portfolioData.debate.experience; labelKey = 'post'; subKey = 'cl'; }
        else if(cat === 'debate_ach') { dataArray = portfolioData.debate.achievements; labelKey = 'ach'; subKey = 'tn'; }
        else if(cat === 'politics_pos') { dataArray = portfolioData.politics.positions; labelKey = 'post'; subKey = 'org'; }
        else if(cat === 'politics_act') { dataArray = portfolioData.politics.activities; labelKey = 'title'; subKey = 'des'; }
        else if(cat === 'thoughts') { dataArray = portfolioData.thoughts; labelKey = 'text'; subKey = 'date'; }

        container.innerHTML = dataArray.length === 0 ? '<p style="color:var(--muted); font-size:1rem; text-align:center; padding:30px;">কোন ডাটা নেই।</p>' : '';
        
        dataArray.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div class="info">
                    <div class="title">${item[labelKey] || 'Untitled'}</div>
                    <div class="sub">${item[subKey] || ''}</div>
                </div>
                <button class="del-btn" onclick="removeItem('${cat}', ${index})">মুছুন</button>
            `;
            container.appendChild(div);
        });
    }

    function removeItem(cat, index) {
        if(!confirm("আপনি কি নিশ্চিত?")) return;
        if(cat === 'projects') portfolioData.projects.splice(index, 1);
        else if(cat === 'debate_exp') portfolioData.debate.experience.splice(index, 1);
        else if(cat === 'debate_ach') portfolioData.debate.achievements.splice(index, 1);
        else if(cat === 'politics_pos') portfolioData.politics.positions.splice(index, 1);
        else if(cat === 'politics_act') portfolioData.politics.activities.splice(index, 1);
        else if(cat === 'thoughts') portfolioData.thoughts.splice(index, 1);

        renderDeleteList();
        updateCodeDisplay();
    }

    function updateCodeDisplay() {
        const output = `/**\n * ইসতিয়াক আহমেদ খাঁন - মাস্টার পোর্টফোলিও ডাটা ফাইল\n * ফাইল নেম: Data.js\n */\n\nconst portfolioData = ${JSON.stringify(portfolioData, null, 4)};`;
        document.getElementById('codeOutput').innerText = output;
    }

    function copyData() {
        navigator.clipboard.writeText(document.getElementById('codeOutput').innerText).then(()=>alert("সব কোড কপি করা হয়েছে!"));
    }
</script>

</body>
</html>
