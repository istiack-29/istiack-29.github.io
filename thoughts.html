<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চিন্তাধারা | ইসতিয়াক আহমেদ খাঁন</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --accent: #D4AF37;
            --text-main: #E4E6EB;
            --text-muted: #B0B3B8;
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(10, 10, 10, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg-body); z-index: 99999;
            display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        .loader-img { width: 80px; border-radius: 50%; animation: pulse-img 2s infinite ease-in-out; }
        @keyframes pulse-img { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-inner { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { color: var(--accent); font-weight: 700; letter-spacing: 2px; text-decoration: none; font-size: 1.2rem; }
        .mobile-menu-btn { cursor: pointer; z-index: 10002; padding: 5px; }
        .dot-bar { width: 22px; height: 2px; background: var(--accent); margin: 4px 0; border-radius: 2px; }

        /* --- SIDEBAR MENU --- */
        #mobileNav {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: #0a0a0a; border-left: 1px solid var(--border);
            z-index: 10001; padding: 80px 30px; display: flex; flex-direction: column; gap: 5px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #mobileNav.open { right: 0; }
        #mobileNav a { color: var(--text-main); text-decoration: none; font-size: 1.1rem; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: none; backdrop-filter: blur(4px); }

        /* --- HEADER SECTION --- */
        .profile-container { max-width: 1000px; margin: 60px auto 0; position: relative; }
        .cover-photo { width: 100%; height: 200px; background: #000; border-radius: 0 0 25px 25px; overflow: hidden; }
        .cover-photo img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-header-info { padding: 0 25px; display: flex; align-items: flex-end; gap: 20px; margin-top: -60px; position: relative; z-index: 20; }
        .avatar-box { width: 120px; height: 120px; flex-shrink: 0; display: flex; align-items: flex-end; }
        .avatar-box img { width: 100%; height: auto; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .name-meta { transform: translateY(10px); }
        .name-meta h1 { font-size: 1.6rem; color: var(--accent); line-height: 1.2; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* --- THOUGHTS FEED --- */
        .thoughts-container { max-width: 600px; margin: 40px auto 100px; padding: 0 15px; }
        
        .thought-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .thought-card:hover { border-color: rgba(212, 175, 55, 0.4); background: #181818; }

        .thought-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .mini-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #222; }
        .author-info { flex: 1; }
        .author-name { font-weight: 600; font-size: 0.9rem; color: var(--text-main); display: block; }
        .post-time { font-size: 0.75rem; color: var(--text-muted); display: block; }

        /* --- Content & Side Image Layout --- */
        .thought-body { 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; /* স্লাইড ইমেজের সাথে লেখা টপ এলাইন থাকবে */
        }
        
        .thought-content { 
            flex: 1;
            font-size: 0.95rem; 
            color: var(--text-main); 
            display: -webkit-box;
            -webkit-line-clamp: 3; /* ৩ লাইন লিমিট */
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            min-height: 4.5em; /* ৩ লাইনের স্পেস ধরে রাখবে */
        }
        
        .thought-side-img { 
            width: 80px; 
            height: 70px; /* ৩ লাইনের কাছাকাছি হাইট */
            object-fit: cover; 
            border-radius: 8px;
            border: 1px solid var(--border);
            flex-shrink: 0;
            background: #222;
        }

        .thought-footer {
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .action-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }

        /* --- MODAL --- */
        #thought-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 30000; display: none; overflow-y: auto; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--bg-card);
            max-width: 550px;
            margin: 30px auto;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-body { padding: 20px; }
        .modal-img { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); display: none; }
        .modal-text { font-size: 1rem; line-height: 1.7; color: var(--text-main); white-space: pre-wrap; }
        .close-modal { background: #333; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        @media (max-width: 600px) {
            .cover-photo { height: 160px; }
            .profile-header-info { margin-top: -50px; gap: 15px; }
            .avatar-box { width: 100px; height: 100px; }
            .name-meta h1 { font-size: 1.3rem; }
            .thought-side-img { width: 70px; height: 60px; }
        }
    </style>
</head>
<body>

    <div id="loader"><img src="profile.png" class="loader-img"></div>
    <div class="overlay-bg" id="menuOverlay" onclick="toggleNav()"></div>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">ISTIACK</a>
            <div class="mobile-menu-btn" onclick="toggleNav()">
                <div class="dot-bar"></div><div class="dot-bar"></div><div class="dot-bar"></div>
            </div>
        </div>
    </nav>

    <div id="mobileNav">
        <a href="index.html">🏠 হোম</a>
        <a href="debate.html">🎙️ বিতর্ক</a>
        <a href="politics.html">⚖️ রাজনীতি</a>
        <a href="thoughts.html">💡 চিন্তাধারা</a>
        <a href="donate.html">☕ সহযোগিতা</a>
        <a href="contact.html">📞 যোগাযোগ</a>
    </div>

    <div class="profile-container">
        <div class="cover-photo"><img src="cover.jpg" alt="Cover"></div>
        <div class="profile-header-info">
            <div class="avatar-box"><img src="profile.png" alt="Istiack"></div>
            <div class="name-meta"><h1>চিন্তাধারা</h1></div>
        </div>
    </div>

    <div class="thoughts-container" id="thoughts-feed"></div>

    <!-- MODAL -->
    <div id="thought-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="thought-header" style="margin-bottom:0">
                    <img src="profile.png" class="mini-avatar">
                    <div class="author-info">
                        <span class="author-name">ইসতিয়াক আহমেদ খাঁন</span>
                        <span id="modal-date" class="post-time"></span>
                    </div>
                </div>
                <button class="close-modal" onclick="closeModal()">বন্ধ করুন</button>
            </div>
            <div class="modal-body">
                <img id="modal-img" class="modal-img">
                <div id="modal-text" class="modal-text"></div>
            </div>
        </div>
    </div>

    <script src="Data.js"></script>
    <script>
        function toggleNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('menuOverlay');
            nav.classList.toggle('open');
            overlay.style.display = nav.classList.contains('open') ? 'block' : 'none';
        }

        function renderThoughts() {
            const feed = document.getElementById('thoughts-feed');
            if (typeof portfolioData === 'undefined' || !portfolioData.thoughts) return;

            portfolioData.thoughts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'thought-card';
                card.onclick = () => openModal(post);
                
                // ইমেজ এলিমেন্ট (যদি ডাটাতে থাকে)
                const imgHtml = post.ph ? `<img src="${post.ph}" class="thought-side-img" onerror="this.style.display='none'">` : '';

                card.innerHTML = `
                    <div class="thought-header">
                        <img src="profile.png" class="mini-avatar">
                        <div class="author-info">
                            <span class="author-name">ইসতিয়াক আহমেদ খাঁন</span>
                            <span class="post-time">${post.date || 'কিছুক্ষণ আগে'}</span>
                        </div>
                    </div>
                    <div class="thought-body">
                        <div class="thought-content">${post.text}</div>
                        ${imgHtml}
                    </div>
                    <div class="thought-footer">
                        <button class="action-btn">👍 Like</button>
                        <button class="action-btn">💬 Comment</button>
                        <button class="action-btn">↗️ Share</button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function openModal(post) {
            const modal = document.getElementById('thought-modal');
            const mText = document.getElementById('modal-text');
            const mImg = document.getElementById('modal-img');
            const mDate = document.getElementById('modal-date');

            mText.innerText = post.text;
            mDate.innerText = post.date || 'কিছুক্ষণ আগে';
            
            if(post.ph) {
                mImg.src = post.ph;
                mImg.style.display = 'block';
            } else {
                mImg.style.display = 'none';
            }

            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('thought-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => { if (e.target == document.getElementById('thought-modal')) closeModal(); }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                renderThoughts();
            }, 800);
        };
    </script>
</body>
</html>
