    <style>
        /* ==========================================================================
           ISTIGRAM V6.0 - GOD TIER ARCHITECTURE (THE MASTERCLASS)
           ========================================================================== */

        :root {
            /* Ultimate Color Palette */
            --void: #000000;
            --surface-alpha: rgba(10, 10, 12, 0.7);
            --surface-beta: rgba(18, 18, 22, 0.85);
            --surface-solid: #0d0d12;
            
            --gold-primary: #D4AF37;
            --gold-light: #F9E596;
            --gold-glow: rgba(212, 175, 55, 0.25);
            
            --text-pure: #ffffff;
            --text-muted: #a1a1aa;
            --text-dark: #52525b;
            
            --heart-base: #ff2a5f;
            --heart-glow: rgba(255, 42, 95, 0.6);

            /* Physics & Animation Variables */
            --spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-smooth: cubic-bezier(0.25, 1, 0.5, 1);
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);

            /* Glassmorphism Details */
            --glass-border: inset 0 1px 0 rgba(255, 255, 255, 0.1), inset 0 -1px 0 rgba(0, 0, 0, 0.5);
            --glass-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
            --blur-fx: blur(20px) saturate(190%);
        }

        /* --- Global Resets & Body --- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--void);
            color: var(--text-pure);
            font-family: 'Hind Siliguri', system-ui, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.02) 0%, transparent 40%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-primary); }

        /* --- Magnetic Header (Glassmorphism) --- */
        .header {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 24px); max-width: 600px; height: 60px;
            background: var(--surface-alpha); backdrop-filter: var(--blur-fx); -webkit-backdrop-filter: var(--blur-fx);
            border-radius: 20px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 24px; box-shadow: var(--glass-shadow);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s var(--spring-smooth);
        }

        .header.scrolled {
            top: 0; width: 100%; max-width: 100%; border-radius: 0;
            border-top: none; border-left: none; border-right: none; height: 65px;
        }

        .brand {
            font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900;
            background: linear-gradient(to right, #fff 20%, var(--gold-primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none; letter-spacing: 0.5px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2));
            transition: 0.3s ease;
        }

        .brand:hover { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6)); }

        .top-btns { display: flex; gap: 20px; align-items: center; }
        .top-btns i { font-size: 1.3rem; color: #fff; cursor: pointer; transition: 0.4s var(--spring-bounce); }
        .top-btns i:hover { color: var(--gold-primary); transform: scale(1.2) rotate(-5deg); }

        /* --- 3D Navigation Drawer --- */
        .mobile-menu-toggle { display: none; }
        
        .hamburger-btn {
            display: flex; flex-direction: column; justify-content: space-between;
            width: 26px; height: 16px; cursor: pointer; z-index: 2100; position: relative;
        }
        .hamburger-btn span {
            display: block; width: 100%; height: 2px; background-color: #fff; border-radius: 2px;
            transition: 0.5s var(--spring-bounce); transform-origin: left center;
        }
        .mobile-menu-toggle:checked ~ .header .hamburger-btn span:nth-child(1) { transform: rotate(45deg) scaleX(1.1); background-color: var(--gold-primary); }
        .mobile-menu-toggle:checked ~ .header .hamburger-btn span:nth-child(2) { opacity: 0; transform: translateX(10px); }
        .mobile-menu-toggle:checked ~ .header .hamburger-btn span:nth-child(3) { transform: rotate(-45deg) scaleX(1.1); background-color: var(--gold-primary); }

        .nav-grid {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: var(--blur-fx); -webkit-backdrop-filter: var(--blur-fx);
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px;
            opacity: 0; pointer-events: none; transition: 0.6s var(--spring-smooth);
            clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%);
        }
        .mobile-menu-toggle:checked ~ .nav-grid {
            opacity: 1; pointer-events: auto;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .nav-btn {
            display: flex; align-items: center; width: 100%; max-width: 280px; padding: 18px 24px;
            text-decoration: none; color: var(--text-muted); border-radius: 20px;
            transition: 0.4s var(--spring-smooth); opacity: 0; transform: translateX(50px);
            position: relative; overflow: hidden; background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .mobile-menu-toggle:checked ~ .nav-grid .nav-btn { opacity: 1; transform: translateX(0); }
        /* Staggered animation */
        .mobile-menu-toggle:checked ~ .nav-grid .nav-btn:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu-toggle:checked ~ .nav-grid .nav-btn:nth-child(2) { transition-delay: 0.15s; }
        .mobile-menu-toggle:checked ~ .nav-grid .nav-btn:nth-child(3) { transition-delay: 0.2s; }
        .mobile-menu-toggle:checked ~ .nav-grid .nav-btn:nth-child(4) { transition-delay: 0.25s; }
        .mobile-menu-toggle:checked ~ .nav-grid .nav-btn:nth-child(5) { transition-delay: 0.3s; }

        .nav-btn:hover, .nav-btn.active {
            color: #fff; background: rgba(255,255,255,0.08);
            border-color: rgba(212, 175, 55, 0.3); transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .nav-btn i { font-size: 1.4rem; width: 36px; transition: 0.3s; color: var(--text-dark); }
        .nav-btn:hover i, .nav-btn.active i { color: var(--gold-primary); filter: drop-shadow(0 0 8px var(--gold-glow)); }
        .nav-btn span { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }

        /* --- Core Feed Layout --- */
        .feed {
            max-width: 600px; margin: 100px auto 60px; padding: 0 16px;
            display: flex; flex-direction: column; gap: 40px; position: relative; z-index: 1;
        }

        /* --- Skeleton Preloader (Premium) --- */
        .skeleton-post {
            background: var(--surface-solid); border-radius: 24px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: var(--glass-shadow);
        }
        .skel-head { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .skel-avatar { width: 40px; height: 40px; border-radius: 50%; }
        .skel-name { width: 120px; height: 14px; border-radius: 4px; }
        .skel-body { width: 100%; height: 400px; border-radius: 16px; }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* --- Post Card (The Masterpiece) --- */
        .post {
            background: var(--surface-solid); border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: var(--glass-shadow);
            opacity: 0; transform: translateY(60px) scale(0.95) rotateX(10deg);
            transition: all 0.8s var(--ease-out-expo);
            perspective: 1000px; overflow: hidden;
            position: relative;
        }
        .post.in-view { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
        .post::before {
            content: ''; position: absolute; inset: 0; border-radius: 28px;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent 50%);
            pointer-events: none; z-index: 2;
        }

        /* Post Header */
        .post-head { display: flex; align-items: center; padding: 16px 20px; gap: 14px; position: relative; z-index: 3; }
        .avatar-ring {
            width: 44px; height: 44px; border-radius: 50%; padding: 2px;
            background: linear-gradient(45deg, var(--gold-primary), #fff, var(--gold-primary));
            animation: ringSpin 4s linear infinite;
        }
        @keyframes ringSpin { 100% { transform: rotate(360deg); } }
        .head-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--void); animation: ringSpinRev 4s linear infinite; }
        @keyframes ringSpinRev { 100% { transform: rotate(-360deg); } }
        
        .head-info { flex: 1; }
        .head-name { font-weight: 700; font-size: 0.95rem; color: #fff; display: block; line-height: 1.2; letter-spacing: -0.2px; }
        .head-tag { font-size: 0.75rem; color: var(--gold-primary); font-weight: 500; }
        .post-head .fa-ellipsis { color: var(--text-muted); cursor: pointer; padding: 8px; transition: 0.3s; }
        .post-head .fa-ellipsis:hover { color: #fff; transform: scale(1.2); }

        /* --- ADVANCED CAROUSEL (Liquid Height & Physics) --- */
        .carousel-container {
            position: relative; width: 100%; background: #000;
            overflow: hidden; cursor: pointer; display: flex;
            transition: height 0.5s var(--spring-smooth);
            z-index: 3;
        }
        .carousel-track {
            display: flex; width: 100%; align-items: flex-start;
            overflow-x: auto; scroll-snap-type: x mandatory; 
            scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .carousel-track::-webkit-scrollbar { display: none; }
        .carousel-slide {
            flex: 0 0 100%; width: 100%; scroll-snap-align: center; 
            display: flex; justify-content: center; background: #000; position: relative;
        }
        .media-img {
            width: 100%; height: auto; display: block;
            max-height: 85vh; object-fit: contain;
            transition: transform 0.6s var(--spring-smooth), filter 0.3s;
        }
        .carousel-container:active .media-img { transform: scale(0.98); } /* Haptic tap simulation */
        
        /* Carousel Controls UI */
        .carousel-dots {
            position: absolute; bottom: 16px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 6px; z-index: 10; pointer-events: none;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.4s var(--spring-bounce); backdrop-filter: blur(4px); }
        .dot.active { background: #fff; transform: scale(1.6); box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .slide-counter {
            position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            color: #fff; font-size: 0.75rem; font-weight: 700; padding: 6px 14px; border-radius: 20px; z-index: 10; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- Text/Quote Card (Premium Typography) --- */
        .quote-card {
            padding: 60px 40px; text-align: center; font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 5vw, 1.8rem); font-style: italic; line-height: 1.6;
            background: linear-gradient(135deg, var(--surface-beta), var(--void));
            color: var(--gold-primary); width: 100%; min-height: 400px;
            display: flex; align-items: center; justify-content: center; position: relative;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .quote-card::before { content: '“'; position: absolute; top: 20px; left: 30px; font-size: 6rem; color: rgba(212, 175, 55, 0.1); font-family: sans-serif; line-height: 1; }

        /* --- Particle Engine System --- */
        .heart-pop {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: var(--heart-base); font-size: 120px; pointer-events: none; z-index: 20; 
            filter: drop-shadow(0 20px 50px var(--heart-glow));
            background: linear-gradient(135deg, #ff4b60, #ff0055);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .heart-pop.active { animation: popGodTier 0.9s var(--spring-bounce) forwards; }
        @keyframes popGodTier {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.4) rotate(10deg); opacity: 1; filter: brightness(1.5); }
            60% { transform: translate(-50%, -50%) scale(1.1) rotate(0deg); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(0) rotate(15deg); opacity: 0; }
        }

        .particle {
            position: absolute; pointer-events: none; opacity: 0; z-index: 15;
            color: var(--heart-base); font-size: 20px;
        }

        /* --- Post Meta Data --- */
        .post-meta { padding: 18px 20px 24px; position: relative; z-index: 3; }
        .actions { display: flex; gap: 20px; font-size: 1.6rem; margin-bottom: 14px; color: #fff; }
        .actions i { cursor: pointer; transition: 0.4s var(--spring-bounce); position: relative; }
        .actions i:hover { transform: scale(1.2) translateY(-3px); filter: drop-shadow(0 5px 10px rgba(255,255,255,0.2)); }
        .actions i.btn-like.liked { color: var(--heart-base); animation: likeBump 0.4s var(--spring-bounce); filter: drop-shadow(0 0 15px var(--heart-glow)); }
        @keyframes likeBump { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        
        .likes-count { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; display: block; color: #fff; }
        .caption-box { font-size: 0.95rem; line-height: 1.6; color: var(--text-pure); }
        .caption-box b { font-weight: 700; margin-right: 6px; }
        .caption-box span.read-more { color: var(--text-muted); font-weight: 600; cursor: pointer; transition: 0.3s; margin-left: 5px; }
        .caption-box span.read-more:hover { color: var(--gold-primary); }
        .time-stamp { font-size: 0.7rem; color: var(--text-dark); font-weight: 700; text-transform: uppercase; margin-top: 14px; display: block; letter-spacing: 1px; }

        /* --- Fullscreen Details Modal --- */
        #detail-view {
            position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.7);
            backdrop-filter: var(--blur-fx); -webkit-backdrop-filter: var(--blur-fx);
            display: none; flex-direction: column; opacity: 0; transition: opacity 0.4s ease;
        }
        #detail-view.active { display: flex; opacity: 1; }
        .detail-content {
            background: var(--surface-solid); width: 100%; height: 100%; max-width: 600px; margin: 0 auto;
            transform: translateY(100%); transition: transform 0.5s var(--spring-bounce);
            display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);
        }
        #detail-view.active .detail-content { transform: translateY(0); }
        
        .detail-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);
        }
        .detail-header .fa-chevron-down { font-size: 1.5rem; color: #fff; cursor: pointer; transition: 0.3s; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .detail-header .fa-chevron-down:hover { background: rgba(255,255,255,0.2); transform: translateY(3px); }
        .detail-body { flex: 1; overflow-y: auto; padding: 40px 24px; display: flex; justify-content: center; }
        .detail-text { width: 100%; font-size: 1.15rem; line-height: 1.9; color: rgba(255,255,255,0.9); white-space: pre-wrap; font-family: 'Hind Siliguri', sans-serif; }

        /* --- Premium Toast Notification --- */
        .toast-notification {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #000; padding: 14px 30px;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 5000;
            font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 12px;
            transition: 0.6s var(--spring-bounce); pointer-events: none;
        }
        .toast-notification.show { bottom: 40px; }
        .toast-notification i { color: #10b981; font-size: 1.3rem; }

        /* --- Desktop Architecture Enhancements --- */
        @media (min-width: 1024px) {
            .mobile-menu-toggle, .hamburger-btn, .top-btns { display: none !important; }
            .header { width: 280px; left: 0; top: 0; height: 100vh; background: var(--surface-solid); border: none; border-right: 1px solid rgba(255,255,255,0.08); box-shadow: none; border-radius: 0; padding: 40px 24px; align-items: flex-start; }
            .header.scrolled { height: 100vh; width: 280px; }
            .brand { font-size: 1.8rem; margin-bottom: 50px; display: block; width: 100%; text-align: center; }
            .nav-grid { clip-path: none !important; position: absolute; top: 120px; left: 0; width: 100%; height: auto; background: transparent; backdrop-filter: none; flex-direction: column; padding: 0 16px; opacity: 1 !important; pointer-events: auto !important; }
            .nav-btn { opacity: 1 !important; transform: none !important; max-width: 100%; border-radius: 12px; padding: 16px 20px; margin-bottom: 5px; }
            .nav-btn:hover { background: rgba(255,255,255,0.05); transform: translateX(8px); }
            .feed { margin-left: 280px; width: calc(100% - 280px); padding-top: 40px; }
            .detail-content { border-radius: 24px; height: 85vh; margin-top: 5vh; box-shadow: var(--glass-shadow); }
        }
    </style>
</head>

    <script>
        /**
         * ISTIGRAM V6.0 - THE GOD TIER ENGINE
         * Features: ResizeObserver, IntersectionObserver, Particle Physics, String/Array Parsing
         */

        const FeedDOM = document.getElementById('main-feed');
        
        // 1. Dynamic Open Graph Setup (Perfected)
        function setupDynamicMetaTags(data) {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            if (postId && data && data.thoughts) {
                const post = data.thoughts.find(p => String(p.id) === String(postId));
                if (post) {
                    if (post.text) document.getElementById('og-desc').setAttribute('content', post.text.substring(0, 160) + "...");
                    if (post.ph) {
                        let firstImage = typeof post.ph === 'string' ? post.ph.split(',')[0].trim() : (Array.isArray(post.ph) ? post.ph[0] : "");
                        if (firstImage) {
                            document.getElementById('og-image').setAttribute('content', firstImage);
                            document.getElementById('tw-image').setAttribute('content', firstImage);
                        }
                    }
                }
            }
        }

        // 2. Data Initialization Engine
        function initEngine() {
            let data = typeof portfolioData !== 'undefined' ? portfolioData : (window.portfolioData || null);
            if (data && data.thoughts && data.thoughts.length > 0) {
                setupDynamicMetaTags(data);
                renderFeed(data.thoughts);
            } else {
                let retries = 0;
                const timer = setInterval(() => {
                    retries++;
                    const retryData = typeof portfolioData !== 'undefined' ? portfolioData : window.portfolioData;
                    if (retryData && retryData.thoughts) {
                        clearInterval(timer);
                        setupDynamicMetaTags(retryData);
                        renderFeed(retryData.thoughts);
                    } else if (retries > 40) {
                        clearInterval(timer);
                        FeedDOM.innerHTML = `
                            <div style="text-align:center; padding:80px 20px; border:1px solid rgba(255,255,255,0.1); border-radius:24px;">
                                <i class="fa-solid fa-satellite-dish" style="font-size:3rem; color:var(--text-dark); margin-bottom:15px;"></i>
                                <h3 style="color:#fff; font-family:'Cinzel';">Connection Lost</h3>
                                <p style="color:var(--text-muted); font-size:0.9rem;">Unable to sync with Data.js securely.</p>
                            </div>`;
                    }
                }, 100);
            }
        }

        // Number Formatter (e.g. 1.2k)
        const formatNumber = (num) => Math.abs(num) > 999 ? Math.sign(num)*((Math.abs(num)/1000).toFixed(1)) + 'k' : Math.sign(num)*Math.abs(num);
        const getLikes = () => formatNumber(Math.floor(Math.random() * 8000 + 500));

        // 3. The Master Render Function
        function renderFeed(items) {
            FeedDOM.innerHTML = ''; // Clear skeletons
            
            // Intersection Observer for 3D Reveal on Scroll
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                        observer.unobserve(entry.target); // Reveal only once
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

            items.forEach((item, index) => {
                const post = document.createElement('article');
                post.className = 'post';
                post.id = `post-${item.id || index}`;

                // Parse Media Array/String smoothly
                let photos = [];
                if (item.ph) {
                    photos = typeof item.ph === 'string' ? item.ph.split(',').map(s => s.trim()).filter(Boolean) : (Array.isArray(item.ph) ? item.ph : []);
                }

                let mediaHTML = '';
                if (photos.length > 0) {
                    let trackHtml = photos.map((src, i) => `
                        <div class="carousel-slide">
                            <img src="${src}" class="media-img" loading="lazy" referrerpolicy="no-referrer" 
                                 onload="setupResizeObserver(this, ${index})" 
                                 onerror="this.src='https://placehold.co/800x800/111/D4AF37?text=Image+Lost';">
                        </div>
                    `).join('');

                    let dotsHtml = photos.length > 1 ? photos.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('') : '';
                    let counterHtml = photos.length > 1 ? `<div class="slide-counter" id="counter-${index}">1/${photos.length}</div>` : '';

                    mediaHTML = `
                        <div class="carousel-container" id="carousel-container-${index}" data-index="${index}">
                            <div class="carousel-track" onscroll="syncSliderUI(this, ${index}, ${photos.length})">
                                ${trackHtml}
                            </div>
                            ${counterHtml}
                            <div class="carousel-dots" id="dots-${index}">${dotsHtml}</div>
                            <div class="heart-pop"><i class="fa-solid fa-heart"></i></div>
                        </div>
                    `;
                } else {
                    mediaHTML = `
                        <div class="carousel-container" data-index="${index}">
                            <div class="quote-card">${item.text.substring(0, 100)}...</div>
                            <div class="heart-pop"><i class="fa-solid fa-heart"></i></div>
                        </div>
                    `;
                }

                const safeText = item.text.replace(/"/g, '&quot;');
                const isLong = item.text.length > 110;
                
                post.innerHTML = `
                    <div class="post-head">
                        <div class="avatar-ring"><img src="profile.png" class="head-avatar" referrerpolicy="no-referrer" onerror="this.src='https://ui-avatars.com/api/?name=Istiack&background=D4AF37&color=000'"></div>
                        <div class="head-info">
                            <span class="head-name">anonymous.istiack</span>
                            <span class="head-tag">Original Audio</span>
                        </div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    
                    ${mediaHTML}

                    <div class="post-meta">
                        <div class="actions">
                            <i class="fa-regular fa-heart btn-like" onclick="toggleLike(this)"></i>
                            <i class="fa-regular fa-comment" onclick="openDetail('${item.id || index}')"></i>
                            <i class="fa-regular fa-paper-plane" onclick="shareToNetwork('${item.id || index}')"></i>
                        </div>
                        <span class="likes-count">${getLikes()} likes</span>
                        <div class="caption-box">
                            <b>anonymous.istiack</b> 
                            <span>${item.text.substring(0, 110)}${isLong ? '...' : ''}</span>
                            ${isLong ? `<span class="read-more" onclick="openDetail('${item.id || index}')">more</span>` : ''}
                        </div>
                        <span class="time-stamp">${item.date || 'Just now'}</span>
                    </div>
                `;

                FeedDOM.appendChild(post);
                observer.observe(post);

                // Add Double Tap Event Listener to the newly created container
                const container = post.querySelector('.carousel-container');
                setupDoubleTap(container);
            });
        }

        // 4. Ultimate ResizeObserver for perfect Fluid Heights
        // This watches the image itself. If it loads or screen resizes, frame adapts instantly.
        function setupResizeObserver(imgElement, index) {
            const container = document.getElementById(`carousel-container-${index}`);
            if(!container) return;
            
            const ro = new ResizeObserver(entries => {
                for (let entry of entries) {
                    // Only adjust height if this image is currently the visible one
                    const track = container.querySelector('.carousel-track');
                    if(track) {
                        const activeIndex = Math.round(track.scrollLeft / track.clientWidth);
                        const slides = track.querySelectorAll('.media-img');
                        if(slides[activeIndex] === imgElement && entry.contentRect.height > 0) {
                            container.style.height = `${entry.contentRect.height}px`;
                        }
                    }
                }
            });
            ro.observe(imgElement);
            // Initial set
            if(imgElement.clientHeight > 0) container.style.height = `${imgElement.clientHeight}px`;
        }

        function syncSliderUI(track, index, total) {
            const width = track.clientWidth || 1;
            const activeIndex = Math.round(track.scrollLeft / width);

            const dots = document.querySelectorAll(`#dots-${index} .dot`);
            if(dots.length) dots.forEach((d, i) => d.classList.toggle('active', i === activeIndex));
            
            const counter = document.getElementById(`counter-${index}`);
            if(counter) counter.innerText = `${activeIndex + 1}/${total}`;

            // Sync height to the active slide dynamically
            const container = document.getElementById(`carousel-container-${index}`);
            const slides = track.querySelectorAll('.media-img');
            if (container && slides[activeIndex] && slides[activeIndex].clientHeight > 0) {
                container.style.height = `${slides[activeIndex].clientHeight}px`;
            }
        }

        // 5. Physics Particle Engine for Double Tap
        function spawnParticles(container) {
            const rect = container.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            for(let i=0; i<8; i++) {
                const p = document.createElement('i');
                p.className = 'fa-solid fa-heart particle';
                
                // Random physics
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 80;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 50; // Bias upwards
                const rot = (Math.random() - 0.5) * 90;
                const scale = 0.5 + Math.random() * 0.5;

                p.style.left = `${centerX - 10}px`;
                p.style.top = `${centerY - 10}px`;
                container.appendChild(p);

                // Animate via Web Animations API for performance
                p.animate([
                    { transform: `translate(0,0) scale(${scale}) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0) rotate(${rot}deg)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random()*400,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => p.remove(), 1200);
            }
            
            // Haptic Feedback
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function setupDoubleTap(container) {
            let lastTap = 0;
            container.addEventListener('click', (e) => {
                const now = Date.now();
                if (now - lastTap < 350) { // Valid Double Tap
                    const heart = container.querySelector('.heart-pop');
                    heart.classList.remove('active');
                    void heart.offsetWidth; // Reflow
                    heart.classList.add('active');
                    
                    spawnParticles(container);

                    // Sync Like Button
                    const btn = container.parentElement.querySelector('.btn-like');
                    if(btn && btn.classList.contains('fa-regular')) {
                        btn.className = 'fa-solid fa-heart btn-like liked';
                    }
                }
                lastTap = now;
            });
        }

        function toggleLike(btn) {
            if (btn.classList.contains('fa-regular')) {
                btn.className = 'fa-solid fa-heart btn-like liked';
                if(navigator.vibrate) navigator.vibrate(20);
            } else {
                btn.className = 'fa-regular fa-heart btn-like';
            }
        }

        // 6. Native Share Integration
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function shareToNetwork(id) {
            const link = `${window.location.origin}${window.location.pathname}?id=${id}`;
            const title = 'IstiGram Post';
            
            // Try Native Web Share API first (Super Premium UX on Mobile)
            if (navigator.share) {
                navigator.share({ title: title, url: link })
                .catch(() => copyLinkFallback(link));
            } else {
                copyLinkFallback(link);
            }
        }

        function copyLinkFallback(link) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(link).then(() => showToast('Link copied to clipboard!')).catch(() => copyOldSchool(link));
            } else {
                copyOldSchool(link);
            }
        }

        function copyOldSchool(text) {
            const ta = document.createElement("textarea");
            ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); showToast('Link copied to clipboard!'); } 
            catch (e) { showToast('Unable to copy link.'); } 
            finally { ta.remove(); }
        }

        // 7. Fullscreen Modal Engine
        function openDetail(id) {
            const data = typeof portfolioData !== 'undefined' ? portfolioData : window.portfolioData;
            const post = data.thoughts.find(p => String(p.id) === String(id) || String(data.thoughts.indexOf(p)) === String(id));
            if(post) {
                document.getElementById('detail-text').innerText = post.text;
                const modal = document.getElementById('detail-view');
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                if(navigator.vibrate) navigator.vibrate(10);
            }
        }

        function closeDetail() {
            document.getElementById('detail-view').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Header Scroll Effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if(window.scrollY > 50 && window.innerWidth < 1024) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        }, { passive: true });

        // Ignite the Engine
        window.addEventListener('DOMContentLoaded', initEngine);
    </script>
</body>
</html>
