<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাজনৈতিক | ইসতিয়াক আহমেদ খাঁন</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #111111;
            --accent: #D4AF37;
            --text-main: #FFFFFF;
            --text-muted: #B0B3B8;
            --border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 10, 10, 0.98);
            --live-red: #ff4b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg-body); z-index: 99999;
            display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        .loader-img { width: 80px; border-radius: 50%; animation: pulse-img 2s infinite ease-in-out; }
        @keyframes pulse-img { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-inner { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { color: var(--accent); font-weight: 700; letter-spacing: 2px; text-decoration: none; font-size: 1.2rem; }
        .mobile-menu-btn { cursor: pointer; z-index: 10002; padding: 5px; }
        .dot-bar { width: 22px; height: 2px; background: var(--accent); margin: 4px 0; border-radius: 2px; }

        /* --- SIDEBAR MENU --- */
        #mobileNav {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: #0a0a0a; border-left: 1px solid var(--border);
            z-index: 10001; padding: 80px 30px; display: flex; flex-direction: column; gap: 5px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #mobileNav.open { right: 0; }
        #mobileNav a { color: var(--text-main); text-decoration: none; font-size: 1.1rem; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: none; backdrop-filter: blur(4px); }

        /* --- HEADER SECTION --- */
        .profile-container { max-width: 1000px; margin: 60px auto 0; position: relative; }
        .cover-photo { width: 100%; height: 240px; background: #000; border-radius: 0 0 25px 25px; overflow: hidden; }
        .cover-photo img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-header-info { padding: 0 25px; display: flex; align-items: flex-end; gap: 20px; margin-top: -80px; position: relative; z-index: 20; }
        
        .avatar-box { width: 150px; height: 150px; flex-shrink: 0; overflow: visible; display: flex; align-items: flex-end; }
        .avatar-box img { width: 100%; height: auto; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .name-meta { transform: translateY(5px); }
        .name-meta h1 { font-size: 1.8rem; color: var(--accent); line-height: 1; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* --- POSITIONS SECTION --- */
        .positions-wrapper { max-width: 800px; margin: 40px auto 10px; padding: 0 20px; }
        .section-label { color: var(--accent); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .positions-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .positions-grid::-webkit-scrollbar { height: 4px; }
        .positions-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        .pos-card { 
            min-width: 260px; background: linear-gradient(145deg, #111, #080808); 
            border: 1px solid var(--border); padding: 20px; border-radius: 18px; 
            scroll-snap-align: start; flex-shrink: 0;
        }
        .pos-title { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; }
        .pos-org { color: var(--text-main); font-size: 0.95rem; font-weight: 500; }
        .pos-time { color: var(--text-muted); font-size: 0.85rem; margin-top: 8px; font-weight: 300; }

        /* --- FEED LAYOUT --- */
        .feed-container { max-width: 800px; margin: 20px auto 100px; padding: 0 20px; }
        .post-card { 
            background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); 
            overflow: hidden; margin-bottom: 40px; position: relative;
        }
        .banner-img-container { width: 100%; height: 280px; position: relative; background: #111; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .live-status {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8);
            padding: 6px 14px; border-radius: 25px; display: flex; align-items: center;
            gap: 8px; font-size: 0.8rem; font-weight: 700; color: var(--live-red);
            border: 1px solid var(--live-red); z-index: 10;
        }
        .dot { width: 8px; height: 8px; background: var(--live-red); border-radius: 50%; animation: blink 1s infinite; }

        .post-info { padding: 25px; }
        .post-title { font-size: 1.4rem; color: #fff; margin-bottom: 12px; font-weight: 600; }
        .post-des-short { color: var(--text-muted); font-size: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.6; }
        
        .see-more-btn { 
            margin-top: 20px; display: inline-block; background: none; border: 1.5px solid var(--accent);
            color: var(--accent); padding: 10px 25px; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: 0.3s; text-decoration: none; font-size: 0.95rem;
        }
        .see-more-btn:hover { background: var(--accent); color: #000; }

        /* --- OVERLAY --- */
        #full-post-view { position: fixed; inset: 0; background: var(--bg-body); z-index: 20000; display: none; overflow-y: auto; padding: 30px 20px; }
        .full-post-content { max-width: 700px; margin: 20px auto 80px; }
        .full-post-img { width: 100%; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--border); }
        .full-post-title { font-size: 2rem; color: var(--accent); margin-bottom: 20px; line-height: 1.4; }
        .full-post-des { font-size: 1.1rem; line-height: 1.9; color: var(--text-main); white-space: pre-wrap; margin-bottom: 40px; }
        .btn-back-to-feed { background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent); padding: 12px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 600px) {
            .cover-photo { height: 180px; }
            .profile-header-info { margin-top: -60px; gap: 15px; }
            .avatar-box { width: 110px; height: 110px; }
            .name-meta { transform: translateY(8px); }
            .name-meta h1 { font-size: 1.35rem; }
            .banner-img-container { height: 220px; }
            .pos-card { min-width: 220px; }
        }
    </style>
</head>
<body>

    <div id="loader"><img src="profile.png" class="loader-img"></div>
    <div class="overlay-bg" id="menuOverlay" onclick="toggleNav()"></div>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">ISTIACK</a>
            <div class="mobile-menu-btn" onclick="toggleNav()">
                <div class="dot-bar"></div><div class="dot-bar"></div><div class="dot-bar"></div>
            </div>
        </div>
    </nav>

    <div id="mobileNav">
        <a href="index.html">🏠 হোম</a>
        <a href="debate.html">🎙️ বিতর্ক</a>
        <a href="politics.html">⚖️ রাজনীতি</a>
        <a href="thoughts.html">💡 চিন্তাধারা</a>
        <a href="donate.html">☕ সহযোগিতা</a>
        <a href="contact.html">📞 যোগাযোগ</a>
    </div>

    <!-- PROFILE HEADER -->
    <div class="profile-container">
        <div class="cover-photo">
            <img src="cover.jpg" alt="Cover">
        </div>
        <div class="profile-header-info">
            <div class="avatar-box">
                <img src="profile.png" alt="Istiack">
            </div>
            <div class="name-meta">
                <h1>রাজনৈতিক</h1>
            </div>
        </div>
    </div>

    <!-- POSITIONS SECTION -->
    <div class="positions-wrapper">
        <div class="section-label">দ্বায়িত্ব সমূহ</div>
        <div class="positions-grid" id="positions-list">
            <!-- Data from Data.js politics.positions -->
        </div>
    </div>

    <!-- MAIN FEED -->
    <div class="feed-container">
        <div class="section-label">কার্যক্রম</div>
        <div id="politics-feed"></div>
    </div>

    <!-- FULL POST VIEW -->
    <div id="full-post-view">
        <div class="full-post-content">
            <img id="full-img" class="full-post-img">
            <h2 id="full-title" class="full-post-title"></h2>
            <div id="full-des" class="full-post-des"></div>
            <button class="btn-back-to-feed" onclick="closePost()">← পিছনে যান</button>
        </div>
    </div>

    <script src="Data.js"></script>
    <script>
        function toggleNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('menuOverlay');
            nav.classList.toggle('open');
            overlay.style.display = nav.classList.contains('open') ? 'block' : 'none';
        }

        function renderPositions() {
            const list = document.getElementById('positions-list');
            if (typeof portfolioData === 'undefined' || !portfolioData.politics || !portfolioData.politics.positions) return;

            const positions = portfolioData.politics.positions;
            list.innerHTML = '';
            
            positions.forEach(pos => {
                const card = document.createElement('div');
                card.className = 'pos-card';
                card.innerHTML = `
                    <div class="pos-title">${pos.post}</div>
                    <div class="pos-org">${pos.org}</div>
                    <div class="pos-time">${pos.time}</div>
                `;
                list.appendChild(card);
            });
        }

        function renderFeed() {
            const feed = document.getElementById('politics-feed');
            if (typeof portfolioData === 'undefined' || !portfolioData.politics || !portfolioData.politics.activities) {
                feed.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:40px;">Data.js লোড করা সম্ভব হয়নি।</p>`;
                return;
            }

            const data = portfolioData.politics.activities;
            feed.innerHTML = '';
            
            data.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                const liveTag = index === 0 ? `<div class="live-status"><div class="dot"></div>সর্বশেষ কার্যক্রম</div>` : '';

                card.innerHTML = `
                    <div class="banner-img-container">
                        <img src="${post.ph}" class="banner-img" onerror="this.src='https://images.unsplash.com/photo-1540910419892-f0c970760491?w=800'">
                        ${liveTag}
                    </div>
                    <div class="post-info">
                        <h2 class="post-title">${post.title}</h2>
                        <p class="post-des-short">${post.des}</p>
                        <button class="see-more-btn" onclick="openPost(${post.id})">See More</button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function openPost(id) {
            const post = portfolioData.politics.activities.find(p => p.id === id);
            if(post) {
                document.getElementById('full-img').src = post.ph;
                document.getElementById('full-title').innerText = post.title;
                document.getElementById('full-des').innerText = post.des;
                document.getElementById('full-post-view').style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }

        function closePost() {
            document.getElementById('full-post-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                renderPositions();
                renderFeed();
            }, 800);
        };
    </script>
</body>
</html>
