<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>রাজনৈতিক</title>
    
    <!-- External Assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: rgba(18, 18, 18, 0.7);
            --accent: #D4AF37;
            --text-main: #F2F2F2;
            --text-muted: #B0B0B0;
            --border: rgba(212, 175, 55, 0.15);
            --nav-bg: rgba(5, 5, 5, 0.95);
            --container-width: 850px;
            --live-red: #ff4b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; justify-content: center; align-items: center; transition: opacity 0.6s ease;
        }
        .loader-img { width: 60px; border-radius: 50%; border: 1px solid var(--accent); padding: 2px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--nav-bg); border-bottom: 1px solid var(--border); z-index: 10000;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .nav-inner { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { color: var(--accent); font-family: 'Cinzel', serif; font-weight: 700; text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; }
        
        .desktop-nav { display: none; gap: 18px; align-items: center; }
        .desktop-nav a { color: var(--text-main); text-decoration: none; font-size: 0.85rem; transition: 0.3s; opacity: 0.7; }
        .desktop-nav a:hover, .desktop-nav a.active { color: var(--accent); opacity: 1; }
        .hire-btn-desktop { border: 1px solid var(--accent); color: var(--accent) !important; padding: 5px 15px; border-radius: 20px; opacity: 1 !important; }

        .mobile-menu-btn { cursor: pointer; padding: 5px; z-index: 10002; display: block; }
        .dot-bar { width: 20px; height: 1.5px; background: var(--accent); margin: 5px 0; border-radius: 2px; }

        #mobileNav {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: rgba(8, 8, 8, 0.98); z-index: 10001; padding: 80px 25px;
            display: flex; flex-direction: column; gap: 5px; transition: 0.4s ease;
            backdrop-filter: blur(30px); border-left: 1px solid var(--border);
        }
        #mobileNav.open { right: 0; }
        #mobileNav a { color: #fff; text-decoration: none; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; gap: 12px; }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; backdrop-filter: blur(5px); }

        /* Header Section */
        .cover-photo { width: 100%; height: 200px; overflow: hidden; border-bottom: 1px solid var(--border); border-radius: 0 0 25px 25px; }
        .cover-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        
        .profile-info-bar { 
            width: 100%; max-width: var(--container-width); margin: -60px auto 30px; 
            padding: 0 25px; display: flex; align-items: flex-end; gap: 20px; 
        }
        .avatar-box { width: 130px; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: auto; display: block; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .name-meta { padding-bottom: 10px; }
        .name-meta h1 { font-family: 'Noto Serif Bengali', serif; font-size: 1.8rem; color: var(--accent); }

        /* Layout Container */
        .main-content { width: 100%; max-width: var(--container-width); margin: 0 auto; padding-bottom: 80px; }

        /* Bracket UI Section */
        .bracket-section {
            margin: 40px 20px;
            padding-left: 30px;
            position: relative;
        }

        .section-title {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 30px;
            position: relative;
        }

        /* The vertical curved bracket line */
        .bracket-container {
            position: relative;
            padding-left: 40px;
            margin-left: 10px;
            border-left: 2px solid rgba(212, 175, 55, 0.2);
        }

        .bracket-container::before {
            content: "";
            position: absolute;
            left: -15px;
            top: -20px;
            width: 30px;
            height: calc(100% + 20px);
            border-left: 2px solid var(--accent);
            border-top: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent);
            border-radius: 40px 0 0 40px;
            opacity: 0.6;
        }

        .bracket-item {
            position: relative;
            margin-bottom: 35px;
        }

        .bracket-item::before {
            content: "";
            position: absolute;
            left: -40px;
            top: 14px;
            width: 30px;
            height: 2px;
            background: var(--accent);
            opacity: 0.5;
        }

        .bracket-item::after {
            content: "";
            position: absolute;
            left: -13px;
            top: 12px;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Activity Specific Styling */
        .item-h { font-size: 1.25rem; font-weight: 700; color: #fff; line-height: 1.3; }
        .item-sub { font-size: 0.95rem; color: var(--accent); display: block; margin-top: 2px; }
        .item-time { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
        
        .activity-banner { width: 100%; max-width: 400px; height: 180px; border-radius: 12px; object-fit: cover; margin-top: 10px; border: 1px solid var(--border); display: block; }
        .see-more-btn { 
            margin-top: 12px; background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 6px 18px; border-radius: 8px; font-size: 0.85rem;
            cursor: pointer; transition: 0.3s;
        }
        .see-more-btn:hover { background: var(--accent); color: #000; }

        /* Full Post View */
        #full-post-view { position: fixed; inset: 0; background: var(--bg-body); z-index: 20000; display: none; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(20px); }
        .full-post-content { max-width: 700px; margin: 40px auto; }
        .full-post-img { width: 100%; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--border); }
        .full-post-title { font-family: 'Noto Serif Bengali', serif; font-size: 2rem; color: var(--accent); margin-bottom: 20px; }
        .full-post-des { font-size: 1.1rem; line-height: 1.8; color: var(--text-main); white-space: pre-wrap; }
        .btn-back { background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent); padding: 10px 25px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }

        @media (min-width: 900px) {
            .desktop-nav { display: flex; }
            .mobile-menu-btn { display: none; }
            .profile-info-bar { margin-top: -80px; }
            .avatar-box { width: 170px; }
            .name-meta h1 { font-size: 2.4rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="loader"><img src="profile.png" class="loader-img" onerror="this.src='https://via.placeholder.com/70'"></div>
    
    <div class="overlay-bg" id="menuOverlay" onclick="toggleMobileNav()"></div>
    
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">ISTIACK</a>
            <div class="desktop-nav">
                <a href="index.html">হোম</a>
                <a href="debate.html">বিতর্ক জগৎ</a>
                <a href="politics.html" class="active">রাজনৈতিক জগৎ</a>
                <a href="thoughts.html">ভাবনা</a>
                <a href="donate.html">অনুদান</a>
                <a href="nn.html">নসিহত নামা</a>
                <a href="contact.html">যোগাযোগ</a>
                <a href="hm.html" class="hire-btn-desktop">Hire Me</a>
            </div>
            <div class="mobile-menu-btn" onclick="toggleMobileNav()">
                <div class="dot-bar"></div><div class="dot-bar"></div><div class="dot-bar"></div>
            </div>
        </div>
    </nav>

    <div id="mobileNav">
        <a href="index.html"><i class="fa-solid fa-house"></i> হোম</a>
        <a href="debate.html"><i class="fa-solid fa-microphone"></i> বিতর্ক জগৎ</a>
        <a href="politics.html" style="color:var(--accent)"><i class="fa-solid fa-scale-balanced"></i> রাজনৈতিক জগৎ</a>
        <a href="thoughts.html"><i class="fa-solid fa-brain"></i> ভাবনা</a>
        <a href="donate.html"><i class="fa-solid fa-hand-holding-dollar"></i> অনুদান</a>
        <a href="nn.html"><i class="fa-solid fa-scroll"></i> নসিহত নামা</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> যোগাযোগ</a>
        <a href="hm.html"><i class="fa-solid fa-briefcase"></i> Hire Me</a>
    </div>

    <div class="cover-photo">
        <img src="cover.jpg" onerror="this.src='https://images.unsplash.com/photo-1540910419892-f0c970760491?w=1200'">
    </div>

    <div class="profile-info-bar">
        <div class="avatar-box">
            <img src="profile.png" onerror="this.src='https://via.placeholder.com/150'">
        </div>
        <div class="name-meta">
            <h1>রাজনৈতিক অবদান</h1>
        </div>
    </div>

    <div class="main-content">
        <!-- Positions Section -->
        <div class="bracket-section">
            <h2 class="section-title">রাজনৈতিক পদবীসমূহ</h2>
            <div class="bracket-container" id="pos-list"></div>
        </div>

        <!-- Activities Section -->
        <div class="bracket-section">
            <h2 class="section-title">সাম্প্রতিক কার্যক্রম</h2>
            <div class="bracket-container" id="act-list"></div>
        </div>
    </div>

    <!-- Full Post View Overlay -->
    <div id="full-post-view">
        <div class="full-post-content">
            <button class="btn-back" onclick="closePost()">← পিছনে যান</button>
            <img id="full-img" class="full-post-img">
            <h2 id="full-title" class="full-post-title"></h2>
            <div id="full-des" class="full-post-des"></div>
        </div>
    </div>

    <script src="Data.js"></script>
    <script>
        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('menuOverlay');
            nav.classList.toggle('open');
            overlay.style.display = nav.classList.contains('open') ? 'block' : 'none';
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 30; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.2 + 0.1, opacity: Math.random() * 0.3 });
            }
        }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.fillStyle = `rgba(212, 175, 55, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        function openPost(id) {
            const post = portfolioData.politics.activities.find(p => p.id === id);
            if(post) {
                document.getElementById('full-img').src = post.ph;
                document.getElementById('full-title').innerText = post.title;
                document.getElementById('full-des').innerText = post.des;
                document.getElementById('full-post-view').style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }

        function closePost() {
            document.getElementById('full-post-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = () => {
            initParticles();
            animateParticles();

            if (typeof portfolioData !== 'undefined' && portfolioData.politics) {
                const posList = document.getElementById('pos-list');
                const actList = document.getElementById('act-list');

                // Render Positions
                portfolioData.politics.positions.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bracket-item';
                    div.innerHTML = `
                        <div class="item-h">${item.post}</div>
                        <span class="item-sub">${item.org}</span>
                        <div class="item-time">${item.time}</div>
                    `;
                    posList.appendChild(div);
                });

                // Render Activities
                portfolioData.politics.activities.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bracket-item';
                    div.innerHTML = `
                        <div class="item-h">${item.title}</div>
                        <img src="${item.ph}" class="activity-banner" onerror="this.style.display='none'">
                        <button class="see-more-btn" onclick="openPost(${item.id})">See More</button>
                    `;
                    actList.appendChild(div);
                });
            }

            setTimeout(() => { 
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 600);
            }, 600);
        };
        window.onresize = initParticles;
    </script>
</body>
</html>
